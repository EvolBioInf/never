{{define "components/endpoint-card/parameter"}}
<div class="single-argument">
  <p>Name</p>
  <p>{{.item.Name}}</p>
  <p>Description</p>
  <p>{{.item.Description}}</p>
  <p>Type</p>
  <p>{{.item.Schema}}</p>
  <p>Required</p>
  <p>{{.item.Required}}</p>
  {{if .item.Example}}
  <p>Example</p>
  <p>{{.item.Example}}</p>
  {{end}}
</div>
{{if lt .index (sub .totalArgs 1)}}
<hr class="arg-divider" />
{{end}} {{end}}
